# Docker Compose — Full Stack Deployment
# Local Pi:  docker compose up
# Cloud VPS: docker compose -f docker-compose.yml -f docker-compose.prod.yml up

version: "3.9"

services:

  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./data/water_system.db}
      - SECRET_KEY=${SECRET_KEY:-change-me}
      - SERIAL_PORT=${SERIAL_PORT:-/dev/ttyUSB0}
      - BAUD_RATE=${BAUD_RATE:-9600}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - ./data:/app/data          # Persistent SQLite DB
      - ./backend/static:/app/static
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"   # Arduino USB serial (Pi only)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (dev only — in prod, build and serve via backend/static) ────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    profiles:
      - dev

  # ── Nginx reverse proxy (production) ────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./backend/static:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - prod
